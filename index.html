<style>
  :root{
    --leaf:#23B26B; --leaf-d:#178a51;
    --sky:#3B82F6; --sky-d:#2563eb;
    --sun:#FB923C; --sun-d:#ea7a26;
    --berry:#E8517A;
    --cream:#FFF8EC; --paper:#FFFFFF;
    --ink:#2A3342; --ink-soft:#5b6577;
    --line:#ECE3D2;
    --shadow:0 10px 30px rgba(42,51,66,.10), 0 2px 6px rgba(42,51,66,.06);
    --shadow-lg:0 18px 50px rgba(42,51,66,.16);
    --r:22px;
    --display:"Chalkboard SE","Comic Sans MS","PingFang SC",system-ui,sans-serif;
    --body:"Avenir Next","Avenir","PingFang SC",system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--body); color:var(--ink);
    background:
      radial-gradient(900px 500px at 80% -10%, rgba(59,130,246,.16), transparent 60%),
      radial-gradient(700px 500px at -10% 110%, rgba(35,178,107,.16), transparent 60%),
      var(--cream);
    min-height:100vh; -webkit-text-size-adjust:100%;
  }
  .app{max-width:760px;margin:0 auto;padding:18px 16px 60px}
  h1,h2,h3{font-family:var(--display);margin:0}
  button{font-family:var(--body);cursor:pointer;border:none}
  .hidden{display:none!important}

  /* ---- top bar ---- */
  .topbar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .logo{font-family:var(--display);font-size:22px;font-weight:700;display:flex;align-items:center;gap:8px}
  .logo .badge{background:var(--sun);color:#fff;border-radius:12px;padding:2px 10px;font-size:13px;transform:rotate(-4deg)}
  .spacer{flex:1}
  .ghost-btn{background:var(--paper);border:2px solid var(--line);border-radius:16px;padding:9px 14px;font-size:15px;font-weight:600;color:var(--ink);box-shadow:var(--shadow);transition:transform .12s}
  .ghost-btn:active{transform:scale(.95)}

  /* ---- cards ---- */
  .card{background:var(--paper);border-radius:var(--r);box-shadow:var(--shadow);padding:18px;margin-bottom:16px;border:1px solid rgba(0,0,0,.02)}
  .section-title{font-family:var(--display);font-size:19px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .sub{color:var(--ink-soft);font-size:14px}

  /* ---- family / profile grid ---- */
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  .pcard{background:var(--paper);border-radius:var(--r);box-shadow:var(--shadow);padding:18px;text-align:center;border:3px solid transparent;transition:transform .14s, border-color .14s;position:relative;overflow:hidden}
  .pcard:active{transform:scale(.97)}
  .pcard .ava{font-size:54px;line-height:1;margin-bottom:6px}
  .pcard .pname{font-family:var(--display);font-size:20px}
  .pcard .pmeta{font-size:13px;color:var(--ink-soft);margin-top:4px}
  .pcard .lvtag{display:inline-block;margin-top:8px;background:var(--cream);border-radius:12px;padding:3px 10px;font-size:12px;font-weight:700;color:var(--leaf-d)}
  .flame{color:var(--sun);font-weight:700}

  /* ---- dashboard ---- */
  .dash-head{display:flex;align-items:center;gap:14px}
  .dash-head .ava{font-size:58px}
  .dash-head .who{flex:1}
  .dash-head .who .n{font-family:var(--display);font-size:26px}
  .stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
  .stat{background:var(--cream);border-radius:16px;padding:12px;text-align:center}
  .stat .v{font-family:var(--display);font-size:24px}
  .stat .l{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .progress{height:14px;background:var(--cream);border-radius:10px;overflow:hidden;margin-top:10px}
  .progress > i{display:block;height:100%;background:linear-gradient(90deg,var(--leaf),var(--sky));border-radius:10px;transition:width .6s cubic-bezier(.2,.8,.2,1)}

  .big-btn{width:100%;background:linear-gradient(180deg,var(--sun),var(--sun-d));color:#fff;border-radius:20px;padding:18px;font-family:var(--display);font-size:22px;box-shadow:0 8px 0 #c9621a, var(--shadow);transition:transform .08s, box-shadow .08s;margin-top:16px}
  .big-btn:active{transform:translateY(5px);box-shadow:0 3px 0 #c9621a}
  .row-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
  .pill-btn{background:var(--paper);border:2px solid var(--line);border-radius:18px;padding:14px;font-weight:700;font-size:16px;color:var(--ink);box-shadow:var(--shadow);transition:transform .1s}
  .pill-btn:active{transform:scale(.96)}

  .collection{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  .crit{font-size:30px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:var(--cream);border-radius:14px}
  .crit.locked{filter:grayscale(1);opacity:.35}
  .badge-chip{display:inline-flex;align-items:center;gap:6px;background:var(--cream);border-radius:14px;padding:6px 10px;font-size:13px;font-weight:700;margin:4px 4px 0 0}

  /* ---- modal / flow ---- */
  .overlay{position:fixed;inset:0;background:rgba(42,51,66,.45);backdrop-filter:blur(3px);display:flex;align-items:flex-end;justify-content:center;z-index:50;padding:0}
  .sheet{background:var(--cream);width:100%;max-width:760px;border-radius:28px 28px 0 0;max-height:94vh;overflow:auto;padding:20px 18px calc(28px + env(safe-area-inset-bottom));box-shadow:var(--shadow-lg);animation:rise .26s cubic-bezier(.2,.8,.2,1)}
  @keyframes rise{from{transform:translateY(40px);opacity:.4}to{transform:translateY(0);opacity:1}}
  .sheet-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .sheet-head h2{font-size:21px}
  .step-dots{display:flex;gap:6px;margin:0 auto}
  .step-dots i{width:9px;height:9px;border-radius:50%;background:var(--line)}
  .step-dots i.on{background:var(--sun)}
  .x{margin-left:auto;background:var(--paper);border:2px solid var(--line);border-radius:50%;width:38px;height:38px;font-size:18px;font-weight:700;color:var(--ink-soft)}

  label.fld{display:block;font-weight:700;margin:14px 0 8px;font-size:15px}
  .ti{width:100%;border:2px solid var(--line);border-radius:16px;padding:14px;font-size:17px;background:var(--paper);font-family:var(--body);color:var(--ink)}
  textarea.ti{min-height:90px;resize:vertical;line-height:1.5}
  .ti:focus{outline:none;border-color:var(--sky)}

  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{background:var(--paper);border:2px solid var(--line);border-radius:16px;padding:10px 14px;font-size:15px;font-weight:600;color:var(--ink);transition:all .12s}
  .chip.on{background:var(--sky);border-color:var(--sky);color:#fff}
  .chip.lang.on{background:var(--leaf);border-color:var(--leaf)}
  .chip:active{transform:scale(.95)}

  .q-block{background:var(--paper);border-radius:18px;padding:16px;margin-top:12px;box-shadow:var(--shadow)}
  .q-tag{display:inline-block;font-size:12px;font-weight:700;color:#fff;background:var(--berry);border-radius:10px;padding:2px 9px;margin-bottom:8px}
  .q-tag.mc{background:var(--sky)}
  .q-tag.open{background:var(--leaf)}
  .q-text{font-size:18px;font-weight:600;margin-bottom:10px;line-height:1.45}
  .opt{display:block;width:100%;text-align:left;background:var(--cream);border:2px solid transparent;border-radius:14px;padding:13px 15px;font-size:16px;margin-top:8px;color:var(--ink);transition:all .12s}
  .opt.on{background:#e9f7ef;border-color:var(--leaf);font-weight:700}
  .opt:active{transform:scale(.98)}
  .mic-btn{display:inline-flex;align-items:center;gap:6px;margin-top:10px;background:var(--berry);color:#fff;border-radius:14px;padding:10px 14px;font-weight:700;font-size:15px}
  .buddy-bubble{background:#eaf7ef;border:2px solid #cdeede;border-radius:16px;border-bottom-left-radius:4px;padding:12px 14px;margin-top:10px;font-size:16px;line-height:1.5;color:var(--ink);animation:rise .2s}
  .hint{font-size:13px;color:var(--ink-soft);margin-top:8px;line-height:1.45}

  .timer-wrap{text-align:center;padding:8px 0}
  .timer{font-family:var(--display);font-size:56px;letter-spacing:1px}
  .timer-ctrl{display:flex;gap:10px;justify-content:center;margin-top:8px}

  /* ---- result ---- */
  .result{text-align:center;padding:8px 4px}
  .result .hooray{font-family:var(--display);font-size:30px;margin-bottom:6px}
  .pts-pop{font-family:var(--display);font-size:64px;color:var(--sun);margin:6px 0}
  .breakdown{background:var(--paper);border-radius:18px;padding:14px;text-align:left;margin-top:8px}
  .breakdown div{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--line);font-size:15px}
  .breakdown div:last-child{border:none;font-weight:800}
  .unlock{background:linear-gradient(135deg,#fff3df,#ffe9cf);border-radius:18px;padding:14px;margin-top:12px;font-weight:700}

  /* ---- rewards ---- */
  .reward{display:flex;align-items:center;gap:12px;background:var(--paper);border-radius:18px;padding:14px;margin-top:10px;box-shadow:var(--shadow)}
  .reward .ic{font-size:34px}
  .reward .rinfo{flex:1}
  .reward .rname{font-weight:700;font-size:16px}
  .reward .rcost{font-size:13px;color:var(--ink-soft)}
  .redeem{background:var(--leaf);color:#fff;border-radius:14px;padding:10px 14px;font-weight:700;font-size:15px}
  .redeem:disabled{background:var(--line);color:var(--ink-soft)}

  /* ---- history ---- */
  .hist-item{background:var(--paper);border-radius:16px;padding:13px 15px;margin-top:10px;box-shadow:var(--shadow)}
  .hist-top{display:flex;justify-content:space-between;font-size:14px;color:var(--ink-soft)}
  .hist-book{font-weight:700;font-size:16px;margin:3px 0}
  .hist-ans{font-size:14px;color:var(--ink);background:var(--cream);border-radius:12px;padding:9px 11px;margin-top:6px;line-height:1.45}
  .hist-ans b{color:var(--leaf-d)}

  /* parent rows */
  .prow{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap}
  .prow .ti{flex:1;min-width:120px}
  .mini{background:var(--berry);color:#fff;border-radius:12px;padding:9px 12px;font-weight:700;font-size:14px}
  .mini.gray{background:var(--line);color:var(--ink)}

  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:13px 20px;border-radius:16px;font-weight:600;z-index:99;box-shadow:var(--shadow-lg);animation:rise .2s}
  canvas#confetti{position:fixed;inset:0;pointer-events:none;z-index:60}

  .leader{margin-top:6px}
  .lrow{display:flex;align-items:center;gap:10px;margin-top:9px}
  .lrow .la{font-size:26px}
  .lrow .lname{width:70px;font-weight:700;font-size:14px}
  .lbar{flex:1;height:16px;background:var(--cream);border-radius:8px;overflow:hidden}
  .lbar > i{display:block;height:100%;border-radius:8px;background:linear-gradient(90deg,var(--sun),var(--berry))}
  .lrow .lp{width:46px;text-align:right;font-weight:700;font-size:14px}
  .note{font-size:12px;color:var(--ink-soft);text-align:center;margin-top:18px;line-height:1.5}
</style>
</head>
<body>
<div class="app" id="app"></div>
<canvas id="confetti"></canvas>

<script>
/* ============================================================
   阅读探险队 · Reading Quest  — single-file offline app
   ============================================================ */

/* ---------- storage shim (localStorage + in-memory fallback) ---------- */
const Store = (() => {
  let mem = {}, ok = true;
  try { localStorage.setItem('__t','1'); localStorage.removeItem('__t'); }
  catch(e){ ok = false; }
  return {
    persistent: ok,
    get(k){ try { return ok ? localStorage.getItem(k) : (mem[k] ?? null); } catch(e){ return mem[k] ?? null; } },
    set(k,v){ try { ok ? localStorage.setItem(k,v) : (mem[k]=v); } catch(e){ mem[k]=v; } }
  };
})();
const KEY = 'readingquest_v1';

/* ---------- defaults ---------- */
const COMPANIONS = ['🐢','🦊','🦉','🐼','🦋','🐙','🐳','🦁','🦒','🐧','🦜','🐝','🦄','🦩','🐬','🦚'];
function defaultState(){
  return {
    profiles: {
      charles:{ id:'charles', name:'Charles', emoji:'🦊', band:'big',   goals:{zh:30,en:30}, lexile:{min:790,max:1120}, points:0, totalCheckins:0, booksDone:0, streak:0, lastDate:null, history:[], reading:[], badges:[] },
      kylie:  { id:'kylie',   name:'Kylie',   emoji:'🦋', band:'young', goals:{zh:15,en:15}, lexile:null,                points:0, totalCheckins:0, booksDone:0, streak:0, lastDate:null, history:[], reading:[], badges:[] },
      dad:    { id:'dad',     name:'爸爸',     emoji:'🐻', band:'adult', goals:{zh:20,en:20}, lexile:null,                points:0, totalCheckins:0, booksDone:0, streak:0, lastDate:null, history:[], reading:[], badges:[] },
      mom:    { id:'mom',     name:'妈妈',     emoji:'🐼', band:'adult', goals:{zh:20,en:20}, lexile:null,                points:0, totalCheckins:0, booksDone:0, streak:0, lastDate:null, history:[], reading:[], badges:[] }
    },
    order:['charles','kylie','dad','mom'],
    rewards:[
      {id:'r1', icon:'🍦', name:'周末冰淇淋 / Ice cream', cost:60},
      {id:'r2', icon:'📺', name:'30 分钟动画 / 30 min cartoon', cost:50},
      {id:'r3', icon:'📚', name:'挑一本新书 / Pick a new book', cost:90},
      {id:'r4', icon:'🛝', name:'去公园玩 / Trip to the park', cost:120},
      {id:'r5', icon:'🍽️', name:'决定一顿饭吃什么 / Choose a meal', cost:70},
      {id:'r6', icon:'🎁', name:'大奖：一次小出游 / Big day out', cost:350}
    ],
    redemptions:[],
    settings:{ requireParentConfirm:true, parentPIN:null }
  };
}
let S = load();
function load(){
  const raw = Store.get(KEY);
  if(raw){ try{ return migrate(JSON.parse(raw)); }catch(e){} }
  return defaultState();
}
function migrate(s){
  // 回填新版字段，兼容旧存档，避免缺字段崩溃
  Object.values(s.profiles||{}).forEach(p=>{
    if(!p.goals) p.goals = (p.band==='young') ? {zh:15,en:15} : {zh:20,en:20};
    if(p.lexile===undefined) p.lexile = null;
    if(!Array.isArray(p.history)) p.history=[];
    if(!Array.isArray(p.badges)) p.badges=[];
    if(!Array.isArray(p.reading)) p.reading=[];
    if(p.booksDone==null) p.booksDone=0;
  });
  if(!s.settings) s.settings={requireParentConfirm:true};
  return s;
}
function save(){ Store.set(KEY, JSON.stringify(S)); }

/* ---------- level / goal / tier logic (progressive) ---------- */
const LV_STEP = 60; // points per level
function levelOf(p){ return Math.floor(p.points / LV_STEP) + 1; }
function levelName(lv){
  const names = ['阅读小苗 Sprout','故事探险家 Explorer','书页冒险家 Adventurer','知识寻宝家 Treasure Hunter',
                 '阅读骑士 Reading Knight','智慧旅行家 Sage','书海船长 Captain','传说阅读家 Legend'];
  return names[Math.min(lv-1, names.length-1)];
}
function progressInLevel(p){ return (p.points % LV_STEP) / LV_STEP; }
function timeGoal(p, lang){
  if(p.goals && p.goals[lang]!=null) return p.goals[lang];
  return p.band==='young' ? 15 : 20;
}
function todayMinutes(p, lang){
  const t=todayStr();
  return (p.history||[]).filter(h=>{
    const d=new Date(h.ts); const ds=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
    return ds===t && h.lang===lang;
  }).reduce((s,h)=>s+(h.minutes||0),0);
}
function tierOf(p){
  const lv = levelOf(p);
  const base = p.band==='young' ? 1 : 2;
  return Math.min(3, base + Math.floor((lv-1)/3));
}
function companionsUnlocked(p){ return Math.min(levelOf(p), COMPANIONS.length); }

function lexMatch(p, lex){
  if(!p.lexile || lex==null) return null;
  if(lex < p.lexile.min - 60) return {code:'easy', t:'轻松 Easy', c:'var(--sky)'};
  if(lex > p.lexile.max + 60) return {code:'challenge', t:'有挑战 Challenge', c:'var(--sun)'};
  return {code:'just', t:'刚刚好 Just right', c:'var(--leaf)'};
}

   false = 只用 AI 识别书名(不发孩子的话)，鼓励语用本地内置 → 更保护隐私（推荐）
   true  = 鼓励语也由 AI 生成（孩子的回答会发到 AI，免费 Gemini 层可能被用于改进产品） */
const AI_ENCOURAGE = false;

async function callClaude(prompt, maxTokens){
  const ctrl=new AbortController(); const to=setTimeout(()=>ctrl.abort(),12000);
  try{
    let res;
    if(WORKER_URL){
      res=await fetch(WORKER_URL,{ method:'POST', headers:{'Content-Type':'application/json'}, signal:ctrl.signal,
        body:JSON.stringify({ prompt, max_tokens:maxTokens||300 }) });
    } else {
      res=await fetch('https://api.anthropic.com/v1/messages',{ method:'POST', headers:{'Content-Type':'application/json'}, signal:ctrl.signal,
        body:JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:maxTokens||300, messages:[{role:'user',content:prompt}] }) });
    }
    clearTimeout(to);
    if(!res.ok) return null;
    const d=await res.json();
    return (d.content||[]).map(x=>x.text||'').join('').trim() || null;
  }catch(e){ clearTimeout(to); return null; }
}
async function aiClassify(title){
  const txt=await callClaude(
    `判断这本童书的分类，返回三项：`+
    `fic = fiction(虚构) 还是 nonfiction(非虚构)；`+
    `genre = 体裁键名，虚构可选 life/adventure/animal/classic/humor/mystery/comic/poetry，非虚构可选 science/history/biography/arts/reference；`+
    `lang = 主要语言 zh 或 en。书名：「${title}」。`+
    `只返回 JSON：{"fic":"fiction或nonfiction","genre":"键名","lang":"zh或en"}`, 200);
  if(!txt) return null;
  try{ const j=JSON.parse(txt.replace(/```json|```/g,'').trim());
    const fic = (j.fic==='nonfiction')?'nonfiction':'fiction';
    const ok = (GENRES[fic]||[]).some(g=>g.k===j.genre);
    if(ok && (j.lang==='zh'||j.lang==='en')) return {fic, genre:j.genre, lang:j.lang};
  }catch(e){}
  return null;
}

/* ---------- online book lookup (free, no key — works on GitHub Pages) ---------- */
async function googleBooks(title){
  const ctrl=new AbortController(); const to=setTimeout(()=>ctrl.abort(),7000);
  try{
    const r=await fetch('https://www.googleapis.com/books/v1/volumes?maxResults=1&q='+encodeURIComponent(title),{signal:ctrl.signal});
    clearTimeout(to);
    const d=await r.json();
    if(!d.items||!d.items.length) return null;
    const v=d.items[0].volumeInfo||{};
    const lang=(v.language||'').startsWith('zh')?'zh':((v.language||'').startsWith('en')?'en':(hasCJK(title)?'zh':'en'));
    const cats=((v.categories||[]).join(' ')+' '+(v.title||'')).toLowerCase();
    let fic='fiction', genre='life';
    if(/nonfiction|non-fiction|juvenile nonfiction|reference|百科|科普/.test(cats)){ fic='nonfiction'; genre='reference'; }
    if(/science|nature|animal nonfiction|科学|自然/.test(cats)){ fic='nonfiction'; genre='science'; }
    else if(/history|社会|历史/.test(cats)){ fic='nonfiction'; genre='history'; }
    else if(/biography|autobiograph|人物|传记/.test(cats)){ fic='nonfiction'; genre='biography'; }
    else if(/art|music|艺术|音乐/.test(cats)){ fic='nonfiction'; genre='arts'; }
    else if(/comic|graphic|漫画/.test(cats)){ fic='fiction'; genre='comic'; }
    else if(/poetry|poem|rhyme|诗|童谣/.test(cats)){ fic='fiction'; genre='poetry'; }
    else if(/fantasy|adventure|magic|冒险|幻想/.test(cats)){ fic='fiction'; genre='adventure'; }
    else if(/animal|动物/.test(cats)){ fic='fiction'; genre='animal'; }
    else if(/humor|funny|幽默/.test(cats)){ fic='fiction'; genre='humor'; }
    else if(/mystery|detective|推理|侦探/.test(cats)){ fic='fiction'; genre='mystery'; }
    else if(/fairy|classic|童话|经典/.test(cats)){ fic='fiction'; genre='classic'; }
    return {fic, genre, lang};
  }catch(e){ clearTimeout(to); return null; }
}
function heuristicType(title){
  const t=title.toLowerCase();
  if(/漫画|comic/.test(t)) return {fic:'fiction', genre:'comic'};
  if(/诗|童谣|poem|poetry|rhyme/.test(t)) return {fic:'fiction', genre:'poetry'};
  if(/百科|科普|为什么|十万个|science|encyclopedia/.test(t)) return {fic:'nonfiction', genre:'science'};
  if(/历史|history/.test(t)) return {fic:'nonfiction', genre:'history'};
  if(/传记|biography/.test(t)) return {fic:'nonfiction', genre:'biography'};
  if(/冒险|adventure|魔法|magic|幻想/.test(t)) return {fic:'fiction', genre:'adventure'};
  return {fic:'fiction', genre:'life'};
}
async function detectBook(title){
  const ai=await aiClassify(title); if(ai) return {...ai, source:'ai'};
  const gb=await googleBooks(title); if(gb) return {...gb, source:'web'};
  const h=heuristicType(title);
  return { fic:h.fic, genre:h.genre, lang:hasCJK(title)?'zh':'en', source:'guess' };
}

/* ---------- CHECK-IN FLOW ---------- */
let flow = null;
function startCheckin(pid, prefill){
  flow = { pid, step:0, book:'', lang:'zh', fic:'fiction', genre:'life', lex:null,
           mode:'whole', progress:'', finishedBook:false, continuing:false,
           langTouched:false, ficTouched:false, genreTouched:false,
           minutes:0, questions:[], answers:{}, cheers:{} };
  if(prefill){ // 从书架或"在读"点进来：书目已知
    flow.book=prefill.t; flow.lang=prefill.lang; flow.fic=prefill.fic; flow.genre=prefill.genre;
    if(prefill.lex!=null) flow.lex=prefill.lex;
    flow.langTouched=true; flow.ficTouched=true; flow.genreTouched=true;
    if(prefill.continue){ flow.mode='serial'; flow.continuing=true; }
  }
  renderFlow();
}
function closeFlow(){ flow=null; const o=$('#overlay'); if(o) o.remove(); render(); }
function flowStep(n){ flow.step=n; renderFlow(); }

function renderFlow(){
  let o=$('#overlay'); if(!o){ o=document.createElement('div'); o.id='overlay'; o.className='overlay'; document.body.appendChild(o); }
  const p=S.profiles[flow.pid];
  const dots=[0,1,2,3].map(i=>`<i class="${i===flow.step?'on':''}"></i>`).join('');
  let body='';

  if(flow.step===0){ // book — mode (whole vs serial) + auto-detect fic/genre/lang
    const inProgress = (p.reading||[]);
    const contChips = (flow.mode==='serial' && !flow.continuing && inProgress.length)
      ? `<div class="sub" style="margin-top:6px">继续在读的书 Continue:</div>
         <div class="chips">${inProgress.map((b,i)=>`<button class="chip" onclick="continueBook(${i})">📖 ${b.book}</button>`).join('')}</div>` : '';
    body=`
      <label class="fld">怎么读的？ How are you reading?</label>
      <div class="chips">
        <button class="chip ${flow.mode==='whole'?'on':''}" onclick="setMode('whole')">📕 读完一本/一个完整故事</button>
        <button class="chip ${flow.mode==='serial'?'on':''}" onclick="setMode('serial')">📚 在读一本长书（今天读一部分）</button>
      </div>
      ${contChips}
      <label class="fld">📕 书名 Book title</label>
      <input class="ti" id="bookInput" autocomplete="off" placeholder="输入书名，可用键盘🎤听写 / Type the title"
             oninput="onTitleInput(this.value)" value="${flow.book.replace(/"/g,'&quot;')}">
      <div id="detectStatus" class="hint" style="min-height:20px;margin-top:8px">${flow.book? '' : '🔍 输入书名后会自动识别 · auto-detected after you type'}</div>
      <label class="fld">🌐 语言 Language</label>
      <div class="chips" id="langChips"></div>
      <label class="fld">📖 虚构还是非虚构？ Fiction or nonfiction?</label>
      <div class="chips" id="ficChips"></div>
      <label class="fld">🏷️ 体裁 Genre <span class="sub">（点一下可改）</span></label>
      <div class="chips" id="genreChips"></div>
      ${flow.mode==='serial'?`
      <label class="fld">📍 今天读到哪了？ Where did you get to today? <span class="sub">（选填）</span></label>
      <input class="ti" id="progInput" autocomplete="off" placeholder="如：第3章 / 第20-35页" value="${(flow.progress||'').replace(/"/g,'&quot;')}" oninput="flow.progress=this.value">
      <label class="prow" style="margin-top:10px;cursor:pointer">
        <input type="checkbox" ${flow.finishedBook?'checked':''} onchange="flow.finishedBook=this.checked" style="width:22px;height:22px">
        <span style="font-weight:700">🎉 今天把这本书读完啦！ Finished the whole book today</span>
      </label>`:''}
      <button class="big-btn" onclick="flowNextBook()">下一步 Next →</button>
    `;
  }
  else if(flow.step===1){ // time
    const goal=timeGoal(p, flow.lang); const done=todayMinutes(p, flow.lang);
    const langTxt = flow.lang==='zh'?'中文':'英文';
    body=`
      <div class="timer-wrap">
        <div class="sub">⏱️ 今天读了多久？ How long did you read?</div>
        <div class="sub" style="margin-top:4px">今日${langTxt}目标 ${goal} 分钟 · 已读 ${done} 分</div>
        <div class="timer" id="timerDisp">${String(Math.floor(timerSec/60)).padStart(2,'0')}:${String(timerSec%60).padStart(2,'0')}</div>
        <div class="timer-ctrl">
          <button class="pill-btn" id="timerToggle" onclick="toggleTimer()">${timerRunning?'⏸ 暂停':'▶️ 开始计时'}</button>
          <button class="pill-btn" onclick="resetTimer()">↺ 重置</button>
        </div>
        <div class="sub" style="margin-top:14px">或者直接选择 Or just pick:</div>
        <div class="chips" style="justify-content:center;margin-top:8px">
          ${[5,10,15,20,30,45].map(m=>`<button class="chip ${flow.minutes===m?'on':''}" onclick="setMinutes(${m})">${m} 分</button>`).join('')}
        </div>
      </div>
      <button class="big-btn" onclick="flowNextTime()">开始答题 Start Q&A →</button>
    `;
  }
  else if(flow.step===2){ // Q&A — encourage sharing, never judge right/wrong
    const L=flow.lang;
    body = flow.questions.map((q,i)=>{
      if(q.kind==='mc'){
        return `<div class="q-block">
          <span class="q-tag mc">${L==='zh'?'选一选（没有对错）':'Pick one'}</span>
          <div class="q-text">${q.q}</div>
          ${q.o.map((opt,oi)=>`<button class="opt ${flow.answers[i]===oi?'on':''}" onclick="answerMC(${i},${oi})">${opt}</button>`).join('')}
        </div>`;
      } else {
        const hasSR = ('webkitSpeechRecognition' in window)||('SpeechRecognition' in window);
        const cheer = flow.cheers[i];
        return `<div class="q-block">
          <span class="q-tag open">${L==='zh'?'说一说':'Tell me'}</span>
          <div class="q-text">${q.q}</div>
          <textarea class="ti" id="ans${i}" placeholder="${L==='zh'?'点这里，按键盘上的 🎤 说出你的想法':'Tap here, press 🎤 on the keyboard to speak'}" oninput="answerOpen(${i}, this.value)">${(flow.answers[i]||'')}</textarea>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">
            ${hasSR?`<button class="mic-btn" onclick="startSpeech(${i},'${L}')">🎤 ${L==='zh'?'语音作答':'Speak'}</button>`:''}
            <button class="mic-btn" style="background:var(--leaf)" onclick="getCheer(${i})">💬 ${L==='zh'?'说完啦，听听小伙伴':'Done — hear back'}</button>
          </div>
          ${cheer?`<div class="buddy-bubble" id="bub${i}">🐾 ${cheer}</div>`:`<div class="buddy-bubble hidden" id="bub${i}"></div>`}
          <div class="hint">💡 ${L==='zh'?'说出你真实的想法就很棒，没有标准答案～':'Just share what you really think — there\'s no right answer!'}</div>
        </div>`;
      }
    }).join('');
    body += `<button class="big-btn" onclick="finishCheckin()">完成打卡！ Finish! 🎉</button>`;
  }

  o.innerHTML = `<div class="sheet">
    <div class="sheet-head">
      ${flow.step>0 && flow.step<3?`<button class="ghost-btn" onclick="flowStep(${flow.step-1})">←</button>`:''}
      <div class="step-dots">${dots}</div>
      <button class="x" onclick="closeFlow()">✕</button>
    </div>
    ${body}
  </div>`;
  if(flow.step===0) paintChips();
}

/* flow setters & auto-detect (imperative DOM updates to keep input focus) */
let detectTimer=null, detectSeq=0;
function onTitleInput(v){
  flow.book=v.trim();
  if(!flow.langTouched) flow.lang = hasCJK(flow.book)?'zh':'en';
  clearTimeout(detectTimer);
  if(!flow.book){ const s=$('#detectStatus'); if(s) s.textContent='🔍 输入书名后会自动识别 · auto-detect'; return; }
  const s=$('#detectStatus'); if(s) s.textContent='🔍 识别中… detecting…';
  const seq=++detectSeq;
  detectTimer=setTimeout(async()=>{
    const r=await detectBook(flow.book);
    if(seq!==detectSeq) return;
    if(!flow.langTouched) flow.lang=r.lang;
    if(!flow.ficTouched)  flow.fic=r.fic;
    if(!flow.genreTouched) flow.genre=r.genre;
    const tag = r.source==='ai'?'🤖 AI 识别':(r.source==='web'?'🌐 联网识别':'🔍 自动判断');
    const st=$('#detectStatus');
    if(st) st.textContent = `${tag}：${genreLabel(flow.fic,flow.genre,flow.lang)} · ${flow.lang==='zh'?'中文':'English'}（不对就点下面改）`;
    paintChips();
  }, 700);
}
function paintChips(){
  const lc=$('#langChips');
  if(lc) lc.innerHTML =
    `<button class="chip lang ${flow.lang==='zh'?'on':''}" onclick="setLang('zh')">中文</button>`+
    `<button class="chip lang ${flow.lang==='en'?'on':''}" onclick="setLang('en')">English</button>`;
  const fc=$('#ficChips');
  if(fc) fc.innerHTML =
    `<button class="chip ${flow.fic==='fiction'?'on':''}" onclick="setFic('fiction')">📖 ${flow.lang==='zh'?'虚构 故事':'Fiction'}</button>`+
    `<button class="chip ${flow.fic==='nonfiction'?'on':''}" onclick="setFic('nonfiction')">🔬 ${flow.lang==='zh'?'非虚构 知识':'Nonfiction'}</button>`;
  const gc=$('#genreChips');
  if(gc) gc.innerHTML = GENRES[flow.fic].map(g=>
    `<button class="chip ${flow.genre===g.k?'on':''}" onclick="setGenre('${g.k}')">${g.emo} ${flow.lang==='zh'?g.zh:g.en}</button>`).join('');
}
function setLang(l){ flow.lang=l; flow.langTouched=true; paintChips(); }
function setFic(f){ flow.fic=f; flow.ficTouched=true;
  if(!GENRES[f].some(g=>g.k===flow.genre)) flow.genre=GENRES[f][0].k;
  flow.genreTouched=true; paintChips(); }
function setGenre(k){ flow.genre=k; flow.genreTouched=true; paintChips(); }
function setMode(m){ flow.mode=m; if(m==='whole'){ flow.continuing=false; flow.finishedBook=false; } renderFlow(); }
function continueBook(i){
  const p=S.profiles[flow.pid]; const b=p.reading[i]; if(!b) return;
  flow.book=b.book; flow.lang=b.lang; flow.fic=b.fic; flow.genre=b.genre; flow.lex=b.lex||null;
  flow.continuing=true; flow.langTouched=true; flow.ficTouched=true; flow.genreTouched=true;
  renderFlow();
}
function setMinutes(m){ stopTimer(); flow.minutes=m; timerSec=m*60; renderFlow(); }
function flowNextBook(){
  if(!flow.book){ toast('请先填写书名 📕 Enter a title first'); return; }
  flowStep(1);
}
function flowNextTime(){
  if(timerSec>0 && flow.minutes===0) flow.minutes=Math.max(1,Math.round(timerSec/60));
  if(flow.minutes===0){ toast(flow.lang==='zh'?'选个时长或开始计时吧 ⏱️':'Pick a time first ⏱️'); return; }
  stopTimer();
  buildQuestions();
  flowStep(2);
}
function buildQuestions(){
  const p=S.profiles[flow.pid]; const L=flow.lang; const tier=tierOf(p);
  const openN = tier===1?1:2;
  const bank = (flow.mode==='serial') ? QUESTIONS.serial : QUESTIONS.open;
  const opens = pick(bank[tier][L], openN).map(q=>({kind:'open', q}));
  const mc = pick(QUESTIONS.mc[L], 1).map(q=>({kind:'mc', q:q.q, o:q.o}));
  flow.questions=[...mc, ...opens]; flow.answers={};
}
function answerMC(i,oi){ flow.answers[i]=oi; renderFlow(); }
function answerOpen(i,v){ flow.answers[i]=v; }
async function getCheer(i){
  const ans=(flow.answers[i]||'').trim();
  const L=flow.lang;
  if(!ans){ toast(L==='zh'?'先说说你的想法吧 😊':'Share your thought first 😊'); return; }
  const bub=$('#bub'+i);
  if(bub){ bub.classList.remove('hidden'); bub.textContent='🐾 …'; }
  const p=S.profiles[flow.pid];
  const age = p.band==='young' ? 7 : 10;
  let msg = await aiEncourage(flow.book, age, L, flow.questions[i].q, ans); // live AI if available
  if(!msg) msg = pick(CHEERS[L],1)[0];                                      // warm fallback
  flow.cheers[i]=msg;
  if(bub){ bub.classList.remove('hidden'); bub.textContent='🐾 '+msg; }
}

/* ---------- timer ---------- */
let timerSec=0, timerRunning=false, timerInt=null;
function toggleTimer(){ timerRunning?stopTimer():runTimer(); $('#timerToggle').textContent=timerRunning?'⏸ 暂停':'▶️ 开始计时'; }
function runTimer(){ timerRunning=true; timerInt=setInterval(()=>{ timerSec++; const d=$('#timerDisp'); if(d) d.textContent=String(Math.floor(timerSec/60)).padStart(2,'0')+':'+String(timerSec%60).padStart(2,'0'); },1000); }
function stopTimer(){ timerRunning=false; clearInterval(timerInt); }
function resetTimer(){ stopTimer(); timerSec=0; flow.minutes=0; renderFlow(); }

/* ---------- speech (optional enhancement) ---------- */
function startSpeech(i,lang){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ toast('请用键盘上的 🎤 听写'); return; }
  const r=new SR(); r.lang = lang==='zh'?'zh-CN':'en-US'; r.interimResults=false;
  r.onresult=e=>{ const t=e.results[0][0].transcript; const ta=$('#ans'+i); ta.value=(ta.value?ta.value+' ':'')+t; flow.answers[i]=ta.value; };
  r.onerror=()=>toast('听不清，试试键盘上的 🎤');
  try{ r.start(); toast(lang==='zh'?'请说话… 🎤':'Listening… 🎤'); }catch(e){ toast('请用键盘 🎤'); }
}

/* ---------- finish & scoring ---------- */
/* 积分规则（四维 + 参与 + 坚持）：
   时长：每 2 分钟 +1（不设上限，越久越多）；达成当日该语言目标额外 +8
   合适难度：在适合区间(刚刚好/挑战) +6，偏简单 +2，难度未知 +4
   广度：本次与上次的"虚构/非虚构或体裁"不同 +5（鼓励 fiction/非虚构、不同类型轮换）
   双语：今天已读过另一种语言 +5（鼓励中英文都兼顾）
   参与：完成打卡 +10，每道问题 +4
   坚持：连击≥3天 +8，≥7天 +15
   读完一本长书：额外 +12 */
function finishCheckin(){
  const p=S.profiles[flow.pid];
  const missing = flow.questions.some((q,i)=> q.kind==='open' && !(flow.answers[i]&&flow.answers[i].trim()));
  if(missing){ toast(flow.lang==='zh'?'把"说一说"答完整再完成哦 😊':'Finish the "Tell me" answers first 😊'); return; }
  const mcAnswered = flow.questions.some((q,i)=> q.kind==='mc' && flow.answers[i]!==undefined);
  if(!mcAnswered){ toast(flow.lang==='zh'?'选一选还没选 😊':'Pick the multiple-choice answer 😊'); return; }

  const L=flow.lang; const t=todayStr();
  // ----- compute dimensions using state BEFORE this check-in -----
  const base=10;
  const timeBonus=Math.floor(flow.minutes/2);
  // 目标达成（该语言）
  const goal=timeGoal(p,L); const prevMin=todayMinutes(p,L); const newMin=prevMin+flow.minutes;
  const goalBonus = (prevMin<goal && newMin>=goal) ? 8 : 0;
  // 合适难度（仅英文且已知 Lexile 可判断）
  const m = (L==='en' && flow.lex!=null) ? lexMatch(p, flow.lex) : null;
  let diffBonus, diffLabel;
  if(m){ if(m.code==='just'){diffBonus=6;diffLabel='难度刚刚好';} else if(m.code==='challenge'){diffBonus=5;diffLabel='挑战自己';} else {diffBonus=2;diffLabel='偏简单';} }
  else { diffBonus=4; diffLabel='认真阅读'; }
  // 广度（与上次不同类型）
  const last=p.history[0];
  const breadthBonus = (!last || last.fic!==flow.fic || last.genre!==flow.genre) ? 5 : 0;
  // 双语（今天已读另一种语言）
  const other=L==='zh'?'en':'zh';
  const biBonus = (todayMinutes(p,other)>0) ? 5 : 0;
  // 参与
  const qBonus=flow.questions.length*4;
  // 坚持
  let newStreak;
  if(p.lastDate===t) newStreak=Math.max(p.streak,1);
  else if(p.lastDate && dayDiff(p.lastDate,t)===1) newStreak=p.streak+1;
  else newStreak=1;
  const streakBonus = newStreak>=7?15 : newStreak>=3?8 : 0;
  // 读完一本长书
  const finishBonus = (flow.mode==='serial' && flow.finishedBook) ? 12 : 0;

  const total=base+timeBonus+goalBonus+diffBonus+breadthBonus+biBonus+qBonus+streakBonus+finishBonus;

  // ----- apply -----
  const before={lv:levelOf(p)};
  p.points+=total;
  if(p.lastDate!==t) p.totalCheckins+=1;
  p.streak=newStreak; p.lastDate=t;

  const answers=flow.questions.map((q,i)=>({q:q.q, kind:q.kind, a: q.kind==='mc'? (q.o[flow.answers[i]]) : flow.answers[i], cheer: flow.cheers[i]||''}));
  p.history.unshift({ ts:Date.now(), book:flow.book, lang:L, fic:flow.fic, genre:flow.genre, type:genreLabel(flow.fic,flow.genre,L), minutes:flow.minutes, mode:flow.mode, progress:flow.progress||'', points:total, answers });

  // ----- currently-reading tracking (serial) -----
  if(!Array.isArray(p.reading)) p.reading=[];
  if(flow.mode==='serial'){
    const idx=p.reading.findIndex(b=>b.book===flow.book && b.lang===L);
    if(flow.finishedBook){
      if(idx>=0) p.reading.splice(idx,1);
      p.booksDone=(p.booksDone||0)+1;
    } else {
      const entry={book:flow.book, lang:L, fic:flow.fic, genre:flow.genre, lex:flow.lex||null, last:flow.progress||'', ts:Date.now()};
      if(idx>=0) p.reading[idx]=entry; else p.reading.unshift(entry);
    }
  } else if(flow.finishedBook===false){
    p.booksDone=(p.booksDone||0)+1; // a whole-book session = one finished book
  }

  // ----- badges -----
  const newBadges=[];
  const langsRead=new Set(p.history.map(h=>h.lang));
  const genresRead=new Set(p.history.map(h=>h.fic+'/'+h.genre));
  function addBadge(b){ if(!p.badges.includes(b)){ p.badges.push(b); newBadges.push(b); } }
  if(newStreak>=7) addBadge('🔥 连击7天 7-day streak');
  if((p.booksDone||0)>=5) addBadge('📚 读完5本书 5 books done');
  if(langsRead.has('zh')&&langsRead.has('en')) addBadge('🌏 双语达人 Bilingual');
  if([...genresRead].some(g=>g.startsWith('fiction'))&&[...genresRead].some(g=>g.startsWith('nonfiction'))) addBadge('🧭 文理兼修 Fiction+Nonfiction');
  if(genresRead.size>=5) addBadge('🎨 涉猎广泛 5 genres');
  if(newMin>=goal && goal>0) addBadge('🎯 达成今日目标 Goal met');

  const after={lv:levelOf(p)};
  const leveledUp = after.lv>before.lv;
  let newCompanion=null;
  if(leveledUp && after.lv<=COMPANIONS.length) newCompanion=COMPANIONS[after.lv-1];

  save();
  showResult(flow.pid, {base,timeBonus,goalBonus,diffBonus,diffLabel,breadthBonus,biBonus,qBonus,streakBonus,finishBonus,total,newStreak,leveledUp,after,newCompanion,newBadges});
}

function renderShelf(pid){

  const card=(b,lang)=>{
    const m = lang==='en' ? lexMatch(p, b.lex) : null;
    const meta = lang==='en'
      ? ((b.lex?`Lexile ${b.lex}L`:'') + (m?` · <span style="color:${m.c};font-weight:700">${m.t}</span>`:''))
      : (b.stage||'');
    const payload = JSON.stringify({t:b.t, lang, fic:b.fic, genre:b.genre, lex:(b.lex!=null?b.lex:null)}).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    return `<div class="reward" onclick='startCheckin("${pid}", ${payload})' style="cursor:pointer">

function redeem(pid,rid){
  const p=S.profiles[pid]; const r=S.rewards.find(x=>x.id===rid);
  if(p.points<r.cost) return;
  const doIt=()=>{ p.points-=r.cost; S.redemptions.unshift({pid, name:r.name, icon:r.icon, cost:r.cost, date:todayStr()}); save(); toast('🎉 兑换成功！告诉爸爸妈妈领取吧'); renderRewards(pid); };

  const a=Math.floor(Math.random()*8)+6, b=Math.floor(Math.random()*8)+6;

function pinSubmit(mode, btn){

  const o=btn.closest('.overlay');
  if(mode==='set'){ S.settings.parentPIN=v; save(); o.remove(); toast('已设置家长密码 🔒'); go('parent'); }

function changeEmoji(id){

  const cur=S.profiles[id].emoji; const idx=choices.indexOf(cur);
  S.profiles[id].emoji=choices[(idx+1)%choices.length]; save(); renderParent();
}
function exportData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='reading-quest-backup.json'; a.click();
  toast('已导出备份 📤');
}

/* ---------- confetti ---------- */
function confetti(){
  const c=$('#confetti'), ctx=c.getContext('2d');
  c.width=innerWidth; c.height=innerHeight;
  const colors=['#23B26B','#3B82F6','#FB923C','#E8517A','#FFD23F'];
  const N=120, parts=[];
  for(let i=0;i<N;i++) parts.push({x:Math.random()*c.width,y:-20-Math.random()*c.height*.3,
    s:6+Math.random()*8, vy:2+Math.random()*4, vx:-2+Math.random()*4, a:Math.random()*Math.PI,
    va:-.2+Math.random()*.4, col:colors[i%colors.length]});
  let t=0;
  (function loop(){
    ctx.clearRect(0,0,c.width,c.height); t++;
    parts.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.a+=p.va;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.a); ctx.fillStyle=p.col;
      ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6); ctx.restore(); });
    if(t<140) requestAnimationFrame(loop); else ctx.clearRect(0,0,c.width,c.height);
  })();
}
